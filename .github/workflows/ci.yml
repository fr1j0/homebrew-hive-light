name: CI

# Lints the cask on every PR to main (and on main), so it can be a required
# status check for merging — mirrors the app repo's `test` gate.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: brew style
        run: brew style Casks/
